name: Build
on:
- push
- pull_request
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macOS-latest
        python-version:
        - "3.8"
        - "3.13"
        networkx-version:
        - "1.*"
        - "2.*"
        exclude:
        - python-version: "3.13"
          networkx-version: "1.*"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
    - name: Install dependencies
      run: |
        uv sync --extra dev
        uv pip install networkx==${{ matrix.networkx-version }}
    - name: Run prek
      if: matrix.python-version == '3.13'
      run: uv run --no-sync prek run --all-files --show-diff-on-failure --color=always
    - name: Test with pytest
      run: uv run --no-sync pytest --color=yes
